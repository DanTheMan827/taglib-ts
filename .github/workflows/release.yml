# .github/workflows/ci-and-release.yml
name: CI + GitHub Release npm Publish

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [published]  # Only triggers publish logic when a real Release is published

jobs:
  ci:
    name: CI – Build/Test/Pack/Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js (latest LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build the project
        run: npm run build

      - name: Pack npm archive
        run: npm pack

      - name: Generate TypeDoc docs
        run: npx typedoc

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: typedoc-docs
          path: docs/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-tarball
          path: "*.tgz"

  release-publish:
    name: Publish to npm on Release
    runs-on: ubuntu-latest
    needs: ci
    # Only run this job when triggered by an actual GitHub Release
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js (latest LTS with npm registry)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Download package .tgz from CI
        uses: actions/download-artifact@v8
        with:
          name: npm-package-tarball
          path: .

      - name: Upload .tgz to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tgz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
