name: TypeScript Build & Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  release:
    types: [published]  # Only triggers publish logic when a real Release is published
  workflow_dispatch:

jobs:
  build-c-validators:
    runs-on: ubuntu-latest
    name: Build C TagLib validators
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache TagLib build
        id: cache-taglib
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: taglib-${{ runner.os }}-${{ hashFiles('taglib/*', 'taglib/**/*') }}

      - name: Cache Validator build
        id: cache-validator
        uses: actions/cache@v5
        with:
          path: validator/build/*
          key: validator-${{ runner.os }}-${{ hashFiles('taglib/*', 'taglib/**/*', 'validator/*', 'validator/**/*') }}

      - name: Install system dependencies
        if: steps.cache-taglib.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zlib1g-dev

      - name: Configure TagLib (from submodule)
        if: steps.cache-taglib.outputs.cache-hit != 'true'
        run: |
          cmake -B taglib/build -S taglib \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build & install TagLib
        if: steps.cache-taglib.outputs.cache-hit != 'true'
        run: cmake --build taglib/build -j$(nproc) && cmake --install taglib/build

      - name: Build C validators
        if: steps.cache-validator.outputs.cache-hit != 'true'
        run: |
          PKG_CONFIG_PATH=$HOME/.local/lib/pkgconfig \
          cmake -B validator/build -S validator \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$HOME/.local
          cmake --build validator/build -j$(nproc)

      - name: Upload validator binaries
        uses: actions/upload-artifact@v7
        with:
          name: c-validators
          path: |
            validator/build/taglib_validate
            validator/build/tag_with_c_full
          retention-days: 1

  build-and-test:
    runs-on: ubuntu-latest
    needs: build-c-validators
    strategy:
      matrix:
        include:
          - node-version: 'lts/*'
          - node-version: 'latest'
          - node-version: 'latest'
            artifacts: 'yes'
    name: Node ${{ matrix.node-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Download C validator binaries
        uses: actions/download-artifact@v8
        with:
          name: c-validators
          path: validator/build

      - name: Make validators executable
        run: chmod +x validator/build/taglib_validate validator/build/tag_with_c_full

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Pack npm archive
        run: npm pack

      - name: Generate TypeDoc docs
        run: npm run docs

      - name: Copy examples
        run: |
          mkdir -p docs/examples
          cp examples/*.ts docs/examples/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        if: matrix.artifacts == 'yes'
        with:
          name: typedoc-docs
          path: docs/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        if: matrix.artifacts == 'yes'
        with:
          name: npm-package-tarball
          path: "*.tgz"

      - name: Test
        run: npm test
        env:
          TAGLIB_VALIDATE: ${{ github.workspace }}/validator/build/taglib_validate
          TAGLIB_TAGGER: ${{ github.workspace }}/validator/build/tag_with_c_full

  release-publish:
    name: Publish to npm on Release
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run this job when triggered by an actual GitHub Release
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Download package .tgz from CI
        uses: actions/download-artifact@v8
        with:
          name: npm-package-tarball
          path: .

      - name: Upload .tgz to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
